<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Demon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Speed Demons</h1>
    <p class="subtitle">Race against time. Beat your friends.</p>

    <div id="home-screen" class="card">
      <label for="nickname">Nickname</label>
      <input type="text" id="nickname" placeholder="Enter your nickname" />

      <p id="connection-message" class="hidden"></p>


      <button id="create-room-btn">Create Room</button>

      <div class="divider">or</div>

      <input type="text" id="room-code-input" placeholder="Enter room code" />
      <button id="join-room-btn">Join Room</button>
    </div>

    <div id="lobby-screen" class="card hidden">
      <h2>Lobby</h2>
      <p>Room Code: <span id="room-code-display">AB12</span></p>

      <div class="players-box">
        <p><strong>Players</strong></p>
        <ul id="players-list">
          <li>You</li>
        </ul>
      </div>

      <label for="duration">Choose time</label>
      <select id="duration">
        <option value="60">1 Minute</option>
        <option value="120">2 Minutes</option>
        <option value="300">5 Minutes</option>
        <option value="600">10 Minutes</option>
      </select>

      <button id="start-btn">Start Game</button>
      <button id="back-btn">Back</button>
    </div>

    <div id="countdown-screen" class="card hidden">
      <h2>Get Ready</h2>
      <p id="countdown-number">3</p>
    </div>

    <div id="game-screen" class="card hidden">
      <div class="top-bar">
        <div>Time: <span id="timer">60</span>s</div>
        <div>Score: <span id="score">0</span></div>
      </div>

      <div class="question-box">
        <h2 id="question">5 + 3</h2>
      </div>

      <input type="number" id="answer-input" placeholder="Type answer" />
      <button id="submit-btn">Submit</button>
    </div>

    <div id="result-screen" class="card hidden">
      <h2>Round Over</h2>
    <p id="winner-text">Winner: You</p>

    <div class="players-box">
        <p><strong>Final Scores</strong></p>
        <ul id="results-list"></ul>
    </div>

    <button id="play-again-btn">Play Again</button>
    </div>

  <script src="app.js"></script>
</body>
</html>
